{% extends 'app/base.html' %}

{% block content %}
<h2>Buscar Post</h2>

<form method="GET">
    <input type="text" name="titulo" placeholder="Buscar...">
    <button type="submit">Buscar</button>
</form>

{% for post in resultados %}
    <div>
        <h3>{{ post.titulo }}</h3>
        <p>{{ post.contenido }}</p>
    </div>
{% endfor %}

{% endblock %}
